name: Build APK

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android
          fi
          cp ~/.android/debug.keystore ./debug.keystore

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/IPTV-Player.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player
          path: app/build/outputs/apk/debug/IPTV-Player.apk

      - name: Create Release and Upload APK
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: IPTV Player (Debug)
          body: |
            ## IPTV Player APK
            - 构建时间: ${{ github.event.repository.updated_at }}
            - 频道源: https://itv.19860519.xyz/output/tv.txt
            - 支持上下滑屏换台、点击显示频道列表
          files: app/build/outputs/apk/debug/IPTV-Player.apk
          overwrite: true
          token: ${{ secrets.GITHUB_TOKEN }}
