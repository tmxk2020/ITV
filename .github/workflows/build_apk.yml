name: Build Android APK

on:
  workflow_dispatch:                 # 手动触发
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install Gradle
        run: |
          # 安装 Gradle 8.3（如果系统中没有）
          if ! command -v gradle &> /dev/null; then
            echo "安装 Gradle..."
            wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip
            unzip -q gradle-8.3-bin.zip
            echo "$(pwd)/gradle-8.3/bin" >> $GITHUB_PATH
          fi
          gradle --version

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Get GitHub Pages URL
        id: pages-url
        run: |
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          OWNER=${GITHUB_REPOSITORY_OWNER}
          BASE_URL="https://$OWNER.github.io/$REPO_NAME/"
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT

      - name: Build APK with gradle
        run: |
          gradle assembleRelease -PbaseUrl=${{ steps.pages-url.outputs.base_url }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release and Upload APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest-apk"
          name: "IPTV Player APK (自动构建)"
          files: app/build/outputs/apk/release/*.apk
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
