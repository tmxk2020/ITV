name: Build GUI Exe and Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write    # 关键权限
  actions: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --onefile --windowed --add-data "gui/styles;styles" --hidden-import "src" --name "IPTV_Collector" gui/main.py

      - name: Upload exe to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/IPTV_Collector.exe
          asset_name: IPTV_Collector_Windows_x64.exe
          tag: ${{ github.ref_name }}
          overwrite: true
