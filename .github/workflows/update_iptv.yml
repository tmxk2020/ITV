name: IPTV 源智能更新与整理

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    concurrency:
      group: iptv-update
      cancel-in-progress: false

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Git 配置
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 清理未跟踪文件（避免冲突）
      run: |
        # 删除所有未跟踪的文件和目录（包括 data/ output/ *.db __pycache__/ 等）
        git clean -fd
        # 同时删除 .gitignore 中定义的缓存文件（如果有）
        rm -rf data/ output/ *.db *.log 2>/dev/null || true
        # 确保关键目录存在
        mkdir -p data output

    - name: 运行采集程序
      run: python -m src.run
      env:
        MAX_WORKERS: 20
        TIMEOUT: 8
        FFMPEG_ENABLE: true
        CACHE_HOURS: 24
        ENABLE_DEMO_FILTER: true
        ENABLE_ALIAS: true
        ENABLE_BLACKLIST: true
        DATABASE_ENABLE: true
        RUN_MODE: once
        IPTV_ORG_ENABLE: true
        ENABLE_GLOBAL_CHANNELS: false
        ENABLE_JSON_OUTPUT: true
        ENABLE_LITE_VERSION: true
        ENABLE_EPG_OUTPUT: true
        AUTONOMOUS_MODE: true
        AUTO_UPDATE_STABLE: true
        AUTO_REPLACE_FAILED: true
        QUALITY_CHECK_INTERVAL: 24
        CANDIDATE_OBSERVATION_HOURS: 24
        CANDIDATE_MIN_SUCCESS: 10
        CANDIDATE_MIN_SUCCESS_RATE: 0.8
        CANDIDATE_MAX_LATENCY: 2000

    - name: 提交并推送更改到 main 分支
      run: |
        # 拉取最新远程更改（使用 rebase 避免冲突）
        echo "🔄 拉取远程最新更改..."
        git pull origin main --rebase --autostash || echo "拉取失败或无更新，继续..."
        
        # 添加所有更改（只添加必要的文件）
        echo "📝 检查并添加更改（仅添加必要的文件）..."
        git add output/*.m3u output/*.txt output/*.json data/*.db 2>/dev/null || true
        git add -A  # 如果上述通配符不匹配，则添加所有变更（但已被 .gitignore 过滤）
        
        if git diff --cached --quiet; then
          echo "✅ 没有检测到新更改"
          exit 0
        fi
        
        echo "📦 提交更改..."
        git commit -m "自动更新 IPTV 列表 - $(date '+%Y-%m-%d %H:%M:%S')"
        
        echo "🚀 推送到 main 分支（带重试）..."
        for i in 1 2 3; do
          echo "尝试第 $i 次推送..."
          if git push origin main; then
            echo "✅ 推送成功"
            exit 0
          else
            echo "⚠️ 推送失败，拉取最新更改后重试..."
            git pull origin main --rebase --autostash
            sleep 2
          fi
        done
        
        echo "⚠️ 重试后仍失败，尝试安全强制推送..."
        git push --force-with-lease origin main
        echo "✅ 安全强制推送成功"

    - name: 部署到 GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: '更新 IPTV 播放列表 - ${{ github.run_id }}'
