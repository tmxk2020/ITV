services:
  iptv-collector:
    build: .
    container_name: iptv-collector
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./alias.txt:/app/alias.txt:ro
      - ./blacklist.txt:/app/blacklist.txt:ro
      - ./demo.txt:/app/demo.txt:ro
    environment:
      # 性能配置
      - MAX_WORKERS=20
      - TIMEOUT=8
      - FFMPEG_ENABLE=true
      # 缓存配置
      - CACHE_HOURS=24
      # 功能开关
      - ENABLE_DEMO_FILTER=true
      - ENABLE_ALIAS=true
      - ENABLE_BLACKLIST=true
      - DATABASE_ENABLE=true
      # 运行模式
      - RUN_MODE=schedule
      - SCHEDULE_INTERVAL=21600
      # Web 服务
      - WEB_SERVER_PORT=8080
      - WEB_SERVER_HOST=0.0.0.0
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
