services:
  iptv-collector:
    build: .
    container_name: iptv-collector
    restart: unless-stopped
    ports:
      - "8000:8000"                # 映射端口，支持 http://IP:8000/tv.m3u 访问
    volumes:
      - ./data:/app/data           # 持久化数据库
      - ./output:/app/output       # 持久化输出文件
      - ./alias.txt:/app/alias.txt:ro
      - ./blacklist.txt:/app/blacklist.txt:ro
      - ./demo.txt:/app/demo.txt:ro
    environment:
      - MAX_WORKERS=10
      - TIMEOUT=10
      - FFMPEG_ENABLE=true
      - ENABLE_RETRY=true
      - ENABLE_IP_RESOLVE=true
      - ENABLE_REGION_FILTER=false
      - CACHE_SPEED_HOURS=24
      - CACHE_RAW_HOURS=24
      - MAX_SOURCES_PER_CHANNEL=5
      - DEMO_MATCH_MODE=contains
      - RUN_MODE=schedule
      - SCHEDULE_INTERVAL=21600
      - WEB_SERVER_PORT=8000
    # 如果网络环境特殊，可使用 host 网络模式（不推荐）
    # network_mode: bridge
