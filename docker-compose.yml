services:
  iptv-collector:
    build: .
    container_name: iptv-collector
    restart: unless-stopped
    ports:
      - "8080:8080"   # 主机端口:容器端口
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./alias.txt:/app/alias.txt:ro
      - ./blacklist.txt:/app/blacklist.txt:ro
      - ./demo.txt:/app/demo.txt:ro
    environment:
      # ... 你的环境变量
      - RUN_MODE=schedule
      - SCHEDULE_INTERVAL=21600
